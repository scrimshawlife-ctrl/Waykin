name: Waykin
options:
  bundleIdPrefix: com.waykin
  deploymentTarget:
    iOS: "17.0"
targets:
  WaykinApp:
    type: application
    platform: iOS
    sources:
      - App
    settings:
      base:
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Waykin uses your location during an active movement session to measure distance, pace, and route progress."
        INFOPLIST_KEY_NSCameraUsageDescription: "Waykin uses the camera to place companions and game events in augmented reality during an active session."
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
    dependencies:
      - package: Waykin
        product: WaykinCore
  WaykinTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - AppTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: WaykinApp
      - package: Waykin
        product: WaykinCore
  WaykinUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - WaykinUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: WaykinApp
packages:
  Waykin:
    path: .
schemes:
  Waykin:
    build:
      targets:
        WaykinApp: all
    test:
      targets:
        - WaykinTests
        - WaykinUITests
    run:
      config: Debug
