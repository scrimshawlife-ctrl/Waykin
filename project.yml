name: Waykin
options:
  bundleIdPrefix: com.waykin
  deploymentTarget:
    iOS: "17.0"
targets:
  WaykinApp:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/*.md"
          - "Resources/Lira_AR_Base.usdz"
          - "Resources/Companion/**"
          - "Resources/Fonts/**"
      - path: App/Resources/Lira_AR_Base.usdz
        type: file
        buildPhase: resources
      - path: App/Resources/Fonts/WaykinDisplay-Regular.ttf
        type: file
        buildPhase: resources
    settings:
      base:
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Waykin uses your location during an active movement session to measure distance, pace, and route progress."
        INFOPLIST_KEY_NSCameraUsageDescription: "Waykin uses the camera to place companions and game events in augmented reality during an active session."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Waykin can optionally read recent walking activity (steps and walking distance) to enrich an active walk. Demo Mode never requires Health access."
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Waykin"
        INFOPLIST_KEY_UIAppFonts:
          - WaykinDisplay-Regular.ttf
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/Waykin.entitlements
    dependencies:
      - package: Waykin
        product: WaykinCore
  WaykinARLab:
    type: application
    platform: iOS
    sources:
      - App/AR
      - path: App/Diagnostics/WaykinLog.swift
      - ARLab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.waykin.arlab
        PRODUCT_NAME: "Waykin AR Lab"
        INFOPLIST_KEY_CFBundleDisplayName: "Waykin AR Lab"
        INFOPLIST_KEY_NSCameraUsageDescription: "Waykin AR Lab uses the camera to validate augmented-reality tracking and placement."
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
    dependencies:
      - package: Waykin
        product: WaykinCore
  WaykinTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - AppTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: WaykinApp
      - package: Waykin
        product: WaykinCore
  WaykinUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - WaykinUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: WaykinApp
packages:
  Waykin:
    path: .
schemes:
  Waykin:
    build:
      targets:
        WaykinApp: all
    test:
      targets:
        - WaykinTests
        - WaykinUITests
    run:
      config: Debug
  WaykinARLab:
    build:
      targets:
        WaykinARLab: all
    run:
      config: Debug
      executable: WaykinARLab
