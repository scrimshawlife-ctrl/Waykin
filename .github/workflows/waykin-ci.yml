name: Waykin CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-package:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: |
          xcodebuild -version
          xcrun swift --version
      - name: Build
        run: xcrun swift build
      - name: Test
        run: xcrun swift test
      - name: Demo
        run: xcrun swift run WaykinDemo

  native-ios:
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Project
        run: xcodegen generate
      - name: Build iOS Simulator
        run: |
          xcodebuild \
            -project Waykin.xcodeproj \
            -scheme Waykin \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build
      - name: Native + UI test suites
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [^(]+' | head -1 | xargs)
          echo "Testing on simulator: $DEVICE"
          # TEMPORARY skip, tracked by issue #203: CanonicalARRuntimeIntegrationTests
          # is known-red on main (10/21) pending an owner ruling. Remove the
          # -skip-testing flag when #203 closes so the gate covers everything.
          xcodebuild \
            -project Waykin.xcodeproj \
            -scheme Waykin \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            -skip-testing:WaykinTests/CanonicalARRuntimeIntegrationTests \
            test
