name: Waykin CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  swift-package:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Demo
        run: swift run WaykinDemo

  native-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Project
        run: xcodegen generate
      - name: Build iOS Simulator
        run: |
          xcodebuild \
            -project Waykin.xcodeproj \
            -scheme Waykin \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build
      # test step can be enabled once more UI tests are added
