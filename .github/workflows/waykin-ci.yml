name: Waykin CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-package:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: |
          xcodebuild -version
          xcrun swift --version
      - name: Build
        run: xcrun swift build
      - name: Test
        run: xcrun swift test
      - name: Demo
        run: xcrun swift run WaykinDemo

  native-ios:
    runs-on: macos-latest
    # UI suite + App unit tests need more than build-only budget.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Project
        run: xcodegen generate
      - name: Resolve simulator destination
        id: sim
        run: |
          set -euo pipefail
          # Prefer a concrete booted-capable iPhone sim; fall back to first available iPhone.
          DEST=""
          for name in "iPhone 17" "iPhone 16" "iPhone 15" "iPhone 17 Pro" "iPhone 16 Pro"; do
            if xcrun simctl list devices available | grep -q "${name} ("; then
              DEST="platform=iOS Simulator,name=${name}"
              echo "Using simulator: ${name}"
              break
            fi
          done
          if [ -z "${DEST}" ]; then
            # Last resort: generic destination (xcodebuild picks)
            DEST="platform=iOS Simulator,name=iPhone 16"
            echo "Fallback simulator name=iPhone 16"
          fi
          echo "destination=${DEST}" >> "$GITHUB_OUTPUT"
      - name: Build iOS Simulator
        run: |
          xcodebuild \
            -project Waykin.xcodeproj \
            -scheme Waykin \
            -sdk iphonesimulator \
            -destination '${{ steps.sim.outputs.destination }}' \
            build
      - name: Test native + UI (gate merges)
        run: |
          set -euo pipefail
          # Gate App unit tests + UI tests so presentation regressions cannot merge
          # invisible to CI (see issue #204). Full AR integration suite included
          # after #203 re-ratification.
          # -retry-tests-on-failure absorbs hosted-runner performance flake
          # (UI tests that pass in seconds locally can time out on the shared
          # runner — see issue #212). CI only; local runs stay strict.
          xcodebuild \
            -project Waykin.xcodeproj \
            -scheme Waykin \
            -sdk iphonesimulator \
            -destination '${{ steps.sim.outputs.destination }}' \
            -retry-tests-on-failure \
            -test-iterations 2 \
            test
