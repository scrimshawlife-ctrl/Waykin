name: Agent task
description: Bounded implementation, review, documentation, or governance work
title: "[agent]: "
body:
  - type: textarea
    id: outcome
    attributes: {label: Outcome}
    validations: {required: true}
  - type: input
    id: workstream
    attributes: {label: Workstream}
    validations: {required: true}
  - type: input
    id: agent_lane
    attributes: {label: Agent lane, description: "IMPLEMENT, REVIEW, TEST, DOCS, DEVICE, or GOVERNANCE"}
    validations: {required: true}
  - type: textarea
    id: dependencies
    attributes: {label: Dependencies}
    validations: {required: true}
  - type: textarea
    id: intended_paths
    attributes: {label: Intended paths}
    validations: {required: true}
  - type: textarea
    id: frozen_paths
    attributes: {label: Frozen paths}
    validations: {required: true}
  - type: textarea
    id: acceptance_criteria
    attributes: {label: Acceptance criteria}
    validations: {required: true}
  - type: textarea
    id: required_validation
    attributes: {label: Required validation}
    validations: {required: true}
  - type: textarea
    id: non_goals
    attributes: {label: Non-goals}
    validations: {required: true}
  - type: textarea
    id: evidence_boundary
    attributes: {label: Evidence boundary, description: "Separate OBSERVED, INFERRED, and NOT_COMPUTABLE evidence."}
    validations: {required: true}
