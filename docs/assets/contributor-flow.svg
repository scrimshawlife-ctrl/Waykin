<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="300" viewBox="0 0 1500 300" role="img" aria-labelledby="title desc">
  <title id="title">Waykin contributor workflow</title><desc id="desc">Approved issue, scoped branch, implementation, tests, draft pull request, review, and squash merge.</desc>
  <rect width="1500" height="300" rx="26" fill="#0B1020"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#F4B860"/></marker><style>.b{fill:#14372F;stroke:#F4B860;stroke-width:2}.t{fill:#F5F7F3;font:600 20px system-ui,sans-serif;text-anchor:middle}.l{stroke:#F4B860;stroke-width:4;marker-end:url(#a)}</style></defs>
  <text x="750" y="45" fill="#F5F7F3" font-family="system-ui,sans-serif" font-size="30" font-weight="700" text-anchor="middle">Issue-scoped delivery</text>
  <g transform="translate(35 100)">
    <g><rect class="b" width="160" height="90" rx="18"/><text class="t" x="80" y="53">Issue</text></g><line class="l" x1="172" y1="45" x2="205" y2="45"/>
    <g transform="translate(220)"><rect class="b" width="160" height="90" rx="18"/><text class="t" x="80" y="53">Branch</text></g><line class="l" x1="392" y1="45" x2="425" y2="45"/>
    <g transform="translate(440)"><rect class="b" width="170" height="90" rx="18"/><text class="t" x="85" y="53">Implement</text></g><line class="l" x1="622" y1="45" x2="655" y2="45"/>
    <g transform="translate(670)"><rect class="b" width="170" height="90" rx="18"/><text class="t" x="85" y="53">Validate</text></g><line class="l" x1="852" y1="45" x2="885" y2="45"/>
    <g transform="translate(900)"><rect class="b" width="170" height="90" rx="18"/><text class="t" x="85" y="53">Draft PR</text></g><line class="l" x1="1082" y1="45" x2="1115" y2="45"/>
    <g transform="translate(1130)"><rect class="b" width="150" height="90" rx="18"/><text class="t" x="75" y="53">Review</text></g><line class="l" x1="1292" y1="45" x2="1325" y2="45"/>
    <g transform="translate(1340)"><rect class="b" width="120" height="90" rx="18"/><text class="t" x="60" y="53">Merge</text></g>
  </g>
  <text x="750" y="255" fill="#B8C2BD" font-family="system-ui,sans-serif" font-size="18" text-anchor="middle">Every change states authority, frozen systems, evidence, device status, and rollback.</text>
</svg>