# Waykin Skill Pack for Grok Build
# Install: ./skills/install.sh

name = "waykin-skill-pack"
version = "1.0.0"
repo = "scrimshawlife-ctrl/Waykin"
baseline_main = "60afcef"
license = "Apache-2.0"
author = "Waykin engineering"

[install]
# Relative skill directories under skills/
skills = [
  "waykin-build",
  "waykin-validate",
  "waykin-ui-review",
  "waykin-device-testing",
  "waykin-ar-debug",
  "waykin-audio",
  "waykin-healthkit",
  "waykin-performance",
  "waykin-pr-review",
  "waykin-release",
]
# Discovery targets (Grok Build)
user_skills_dir = "~/.grok/skills"
repo_skills_dir = ".grok/skills"
shared_references = ["_shared/references/REPO_CONTEXT.md"]

[dependencies]
commands = [
  "swift",
  "xcodegen",
  "xcodebuild",
  "make",
  "git",
  "python3",
  "gh",
]
optional_commands = ["xcrun", "instruments"]
repo_scripts = [
  "scripts/validate.sh",
  "scripts/check_core_framework_isolation.sh",
  "scripts/check_lira_usdz_integrity.sh",
  "scripts/validate_simulator.sh",
  "scripts/capture_sim_screenshots.sh",
  "scripts/sim_walk_preflight.sh",
  "scripts/outdoor_qa_prep.sh",
  "scripts/validate_collaboration_coordination.py",
]

[compatibility]
swift = "6.x"
ios_deployment = "17.0"
xcode = "26.x preferred"
platforms = ["macos-host", "ios-simulator", "ios-device"]
